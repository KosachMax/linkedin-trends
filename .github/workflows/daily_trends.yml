name: Daily Trends

on:
  schedule:
    - cron: '0 6 * * *'   # UTC 06:00 = Moscow 09:00
  workflow_dispatch:        # manual run button in GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipelines
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          OUTPUT_MODE: github
        run: python main.py --mode all

      - name: Commit and push docs
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add docs/
          git diff --staged --quiet || git commit -m "Daily trends $(date +%Y-%m-%d)"
          git push
