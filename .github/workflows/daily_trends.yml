name: Daily Trends

on:
  schedule:
    - cron: '30 5 * * *'   # UTC 05:30 = Moscow 08:30
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipelines
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT_MODE: github
        run: python main.py --mode all

      - name: Verify pipeline output
        run: |
          echo "--- quartz/content/tech ---"
          ls -la quartz/content/tech/ || true
          echo "--- quartz/content/news ---"
          ls -la quartz/content/news/ || true
          echo "--- data ---"
          ls -la data/ || true
          TODAY=$(date -u +%Y-%m-%d)
          if [ ! -f "quartz/content/tech/${TODAY}.md" ]; then
            echo "::error::tech/${TODAY}.md missing — tech pipeline failed silently"
            exit 1
          fi
          if [ ! -f "quartz/content/news/${TODAY}.md" ]; then
            echo "::error::news/${TODAY}.md missing — news pipeline failed silently"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz dependencies
        run: cd quartz && npm ci

      - name: Build Quartz
        run: cd quartz && npx quartz build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: quartz/public
          publish_branch: gh-pages
