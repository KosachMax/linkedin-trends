site_name: Daily Trends
site_description: Ежедневный дайджест tech трендов и мировых новостей
site_url: https://kosachmax.github.io/linkedin-trends/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: ru
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  features:
    - navigation.top
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search:
      lang: ru

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kosachmax
